<text x="120" y="88" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="12">Helm + manifests</text>

<line x1="200" y1="72" x2="278" y2="72" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>

